<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d8fff"/>
      <stop offset="100%" stop-color="#7C6EF7"/>
    </linearGradient>
  </defs>
  <!-- Hexagon -->
  <polygon
    points="32,4 56,18 56,46 32,60 8,46 8,18"
    fill="url(#g)"
    opacity="0.15"
    stroke="#7C6EF7"
    stroke-width="2.5"
  />
  <!-- Inner lens / eye shape -->
  <ellipse cx="32" cy="32" rx="10" ry="10" fill="none" stroke="#7C6EF7" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="4" fill="#7C6EF7"/>
  <!-- Scan line accent -->
  <line x1="14" y1="32" x2="22" y2="32" stroke="#7C6EF7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="32" x2="50" y2="32" stroke="#7C6EF7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
